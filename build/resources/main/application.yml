spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vetplatform
    username: ${DB_USERNAME:vetplatform}
    password: ${DB_PASSWORD:vetplatform}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

llm:
  provider: ${LLM_PROVIDER:claude}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:claude-sonnet-4-20250514}
  timeout-seconds: 30
  max-retries: 2
  prompt-version: v1.0

review:
  max-length: 5000
  min-length: 10
  confidence-threshold: 0.5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

matching:
  min-similarity-threshold: 0.3
  min-cases-per-vet: 2
  max-candidates: 500
  default-max-results: 5

spring.task.execution:
  pool:
    core-size: 4
    max-size: 8
    queue-capacity: 100
  thread-name-prefix: review-processor-
